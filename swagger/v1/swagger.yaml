---
openapi: 3.0.1
info:
  title: Peremoga API
  version: v1
  description: Donation and aid-coordination platform for Ukraine
paths:
  "/api/v1/login":
    post:
      summary: Sign in
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: signed in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/User"
                  token:
                    type: string
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                  required:
                  - email
                  - password
  "/api/v1/logout":
    delete:
      summary: Sign out
      tags:
      - Auth
      security:
      - bearer_auth: []
      responses:
        '200':
          description: signed out
  "/api/v1/categories":
    get:
      summary: List categories
      tags:
      - Categories
      responses:
        '200':
          description: categories listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Category"
  "/api/v1/tickets/{ticket_id}/comments":
    parameters:
    - name: ticket_id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: List comments
      tags:
      - Comments
      security:
      - bearer_auth: []
      responses:
        '200':
          description: comments listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Comment"
                  meta:
                    "$ref": "#/components/schemas/Pagination"
    post:
      summary: Create comment
      tags:
      - Comments
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: comment created
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: object
                  properties:
                    body:
                      type: string
                  required:
                  - body
  "/api/v1/fundraisers":
    get:
      summary: List fundraisers
      tags:
      - Fundraisers
      responses:
        '200':
          description: fundraisers listed
    post:
      summary: Create fundraiser
      tags:
      - Fundraisers
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: fundraiser created
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fundraiser:
                  type: object
                  properties:
                    title:
                      type: string
                    currency:
                      type: string
                      enum:
                      - UAH
                      - USD
                    total:
                      type: number
                  required:
                  - title
                  - currency
                  - total
  "/api/v1/fundraisers/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get fundraiser
      tags:
      - Fundraisers
      security:
      - bearer_auth: []
      responses:
        '200':
          description: fundraiser found
    delete:
      summary: Delete fundraiser
      tags:
      - Fundraisers
      security:
      - bearer_auth: []
      responses:
        '204':
          description: fundraiser deleted
  "/api/v1/news":
    get:
      summary: List news
      tags:
      - News
      responses:
        '200':
          description: news listed
    post:
      summary: Create news
      tags:
      - News
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: news created
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                news_item:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    kind:
                      type: string
                      enum:
                      - news
                      - event
                  required:
                  - title
                  - description
                  - kind
  "/api/v1/news/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get news
      tags:
      - News
      security:
      - bearer_auth: []
      responses:
        '200':
          description: news found
    delete:
      summary: Delete news
      tags:
      - News
      security:
      - bearer_auth: []
      responses:
        '204':
          description: news deleted
  "/api/v1/search":
    get:
      summary: Search across entities
      tags:
      - Search
      parameters:
      - name: q
        in: query
        required: false
        schema:
          type: string
      - name: scope
        in: query
        required: false
        enum:
        - all
        - tickets
        - news
        - fundraisers
        schema:
          type: string
        description: ":\n * `all` \n * `tickets` \n * `news` \n * `fundraisers` \n "
      responses:
        '200':
          description: search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      tickets:
                        type:
                        - object
                        - 'null'
                      news_items:
                        type:
                        - object
                        - 'null'
                      fundraisers:
                        type:
                        - object
                        - 'null'
  "/api/v1/tickets":
    get:
      summary: List tickets
      tags:
      - Tickets
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: ticket_type
        in: query
        required: false
        enum:
        - offer
        - request
        schema:
          type: string
        description: ":\n * `offer` \n * `request` \n "
      responses:
        '200':
          description: tickets listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/TicketList"
                  meta:
                    "$ref": "#/components/schemas/Pagination"
    post:
      summary: Create ticket
      tags:
      - Tickets
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: ticket created
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: string
        required: true
  "/api/v1/tickets/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get ticket
      tags:
      - Tickets
      security:
      - bearer_auth: []
      responses:
        '200':
          description: ticket found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Ticket"
    patch:
      summary: Update ticket
      tags:
      - Tickets
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: ticket updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ticket:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
    delete:
      summary: Delete ticket
      tags:
      - Tickets
      security:
      - bearer_auth: []
      responses:
        '204':
          description: ticket deleted
  "/api/v1/users":
    get:
      summary: List users
      tags:
      - Users
      security:
      - bearer_auth: []
      responses:
        '200':
          description: users listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/User"
    post:
      summary: Register user
      tags:
      - Users
      parameters: []
      responses:
        '201':
          description: user registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/User"
                  token:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
                    organization_name:
                      type: string
                    role:
                      type: string
                      enum:
                      - individual
                      - organization
                  required:
                  - email
                  - password
                  - password_confirmation
                  - role
  "/api/v1/users/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get user
      tags:
      - Users
      security:
      - bearer_auth: []
      responses:
        '200':
          description: user found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/User"
    patch:
      summary: Update user
      tags:
      - Users
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: user updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    biography:
                      type: string
                    location:
                      type: string
    delete:
      summary: Delete user
      tags:
      - Users
      security:
      - bearer_auth: []
      responses:
        '204':
          description: user deleted
servers:
- url: http://localhost:3000
  description: Development
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearer_format: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
    Pagination:
      type: object
      properties:
        current_page:
          type: integer
        next_page:
          type:
          - integer
          - 'null'
        prev_page:
          type:
          - integer
          - 'null'
        total_pages:
          type: integer
        total_count:
          type: integer
        per_page:
          type: integer
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum:
          - individual
          - organization
          - moderator
          - admin
        first_name:
          type:
          - string
          - 'null'
        last_name:
          type:
          - string
          - 'null'
        organization_name:
          type:
          - string
          - 'null'
        biography:
          type:
          - string
          - 'null'
        location:
          type:
          - string
          - 'null'
        created_at:
          type: string
          format: date_time
      required:
      - id
      - email
      - role
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
      required:
      - id
      - title
    Ticket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        location:
          type: string
        image:
          type:
          - string
          - 'null'
        image_url:
          type:
          - string
          - 'null'
        ticket_type:
          type: string
          enum:
          - offer
          - request
        category:
          "$ref": "#/components/schemas/Category"
        author:
          "$ref": "#/components/schemas/User"
        created_at:
          type: string
          format: date_time
        updated_at:
          type: string
          format: date_time
      required:
      - id
      - title
      - description
      - ticket_type
    TicketList:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        ticket_type:
          type: string
        location:
          type: string
        created_at:
          type: string
          format: date_time
        category:
          "$ref": "#/components/schemas/Category"
    Fundraiser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type:
          - string
          - 'null'
        image:
          type:
          - string
          - 'null'
        image_url:
          type:
          - string
          - 'null'
        currency:
          type: string
          enum:
          - UAH
          - USD
        raised:
          type: number
        total:
          type: number
        progress_percent:
          type: number
        author:
          "$ref": "#/components/schemas/User"
        created_at:
          type: string
          format: date_time
        updated_at:
          type: string
          format: date_time
      required:
      - id
      - title
      - currency
      - raised
      - total
    NewsItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        image:
          type:
          - string
          - 'null'
        image_url:
          type:
          - string
          - 'null'
        kind:
          type: string
          enum:
          - news
          - event
        author:
          "$ref": "#/components/schemas/User"
        created_at:
          type: string
          format: date_time
        updated_at:
          type: string
          format: date_time
      required:
      - id
      - title
      - description
      - kind
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        body:
          type: string
        user:
          "$ref": "#/components/schemas/User"
        created_at:
          type: string
          format: date_time
        updated_at:
          type: string
          format: date_time
      required:
      - id
      - body
